var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() {
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    });
  }
}
window.addEventListener('appinstalled', function() {
  document.getElementById('installBanner').style.display = 'none';
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('results').innerHTML = '<div class="welcome"><div class="icon">👥</div><p>이름을 입력하면<br>교직원 정보를 검색합니다</p></div>';
  document.getElementById('resultCount').textContent = '';
}

function doSearch() {
  var query = document.getElementById('searchInput').value.trim();
  var clearBtn = document.getElementById('clearBtn');
  clearBtn.style.display = query ? 'block' : 'none';

  var results = document.getElementById('results');
  var countEl = document.getElementById('resultCount');

  if (!query) {
    results.innerHTML = '<div class="welcome"><div class="icon">👥</div><p>이름을 입력하면<br>교직원 정보를 검색합니다</p></div>';
    countEl.textContent = '';
    return;
  }

  var matched = staff.filter(function(s) { return s.name.indexOf(query) !== -1; });
  countEl.textContent = matched.length > 0 ? '검색 결과: ' + matched.length + '명' : '';

  if (matched.length === 0) {
    results.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>"' + query + '"을(를) 찾을 수 없습니다.</p><small>이름 전체 또는 일부를 입력해보세요</small></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < matched.length; i++) {
    var s = matched[i];
    var nameHL = s.name.split(query).join('<span class="highlight">' + query + '</span>');
    var extPhone = s.ext ? '02-6310-' + s.ext : '';
    var phoneHtml = s.phone ? '<a href="tel:' + s.phone + '">' + s.phone + '</a>' : '<span class="no-phone">미등록</span>';
    var extHtml = s.ext ? '<div class="contact-value">' + s.ext + '</div>' : '<span class="no-phone">-</span>';
    var directHtml = extPhone ? '<div class="contact-item full"><div class="contact-label">🏢 직통전화</div><a href="tel:' + extPhone + '">' + extPhone + '</a></div>' : '';

    html += '<div class="card ' + s.dc + '">';
    html += '<div class="card-header">';
    html += '<div class="name-block"><div class="name">' + nameHL + '</div><div class="position-text">' + s.position + '</div></div>';
    html += '<span class="dept-badge">' + s.dept + '</span>';
    html += '</div>';
    html += '<div class="contact-row">';
    html += '<div class="contact-item"><div class="contact-label">📱 휴대전화</div>' + phoneHtml + '</div>';
    html += '<div class="contact-item"><div class="contact-label">☎ 내선번호</div>' + extHtml + '</div>';
    html += directHtml;
    html += '</div>';
    html += '<div class="duties-section"><div class="duties-label">📋 업무 분장</div><div class="duties-text">' + s.duties + '</div></div>';
    html += '</div>';
  }
  results.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') clearSearch();
});
</script>
</body>
</html>
